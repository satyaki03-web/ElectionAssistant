server {
    listen 8080; # Cloud Run default port
    
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        
        # This is critical for Single Page Applications (React/Vite).
        # It ensures that if a user visits a specific route directly,
        # Nginx falls back to serving index.html instead of returning a 404.
        try_files $uri $uri/ /index.html; 
    }

    # Optional: Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        root   /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}
